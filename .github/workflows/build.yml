name: Build addons

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            devcmd_arch: x64
            artifact_suffix: addon64
            artifact_name: zzz_display_commander.addon64
          - arch: x86
            devcmd_arch: x86
            artifact_suffix: addon32
            artifact_name: zzz_display_commander.addon32

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC (${{ matrix.devcmd_arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.devcmd_arch }}

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGIT_COMMIT_COUNT=${{ github.run_number }}

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release --parallel

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          mkdir -p artifacts
          # Look specifically for display_commander addon files
          display_commander_file=$(find build -type f -name "zzz_display_commander.${{ matrix.artifact_suffix }}" | head -1)
          if [ -z "$display_commander_file" ]; then
            echo "Display Commander addon file not found; listing build dir for debugging:" >&2
            find build -type f -name "*.${{ matrix.artifact_suffix }}" || true
            ls -la build || true
            exit 1
          fi
          # Copy the display_commander addon with the correct name
          cp "$display_commander_file" "artifacts/${{ matrix.artifact_name }}"
          echo "artifact_dir=artifacts" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zzz-display-commander-${{ matrix.artifact_suffix }}
          path: ${{ steps.collect.outputs.artifact_dir }}/*
          if-no-files-found: error

  build-debug:
    name: Build Debug (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            devcmd_arch: x64
            artifact_suffix: addon64
            artifact_name: zzz_display_commander.addon64
            pdb_suffix: x64
          - arch: x86
            devcmd_arch: x86
            artifact_suffix: addon32
            artifact_name: zzz_display_commander.addon32
            pdb_suffix: x86

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC (${{ matrix.devcmd_arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.devcmd_arch }}

      - name: Configure (Debug)
        shell: bash
        run: |
          cmake -S . -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug -DGIT_COMMIT_COUNT=${{ github.run_number }}

      - name: Build (Debug)
        shell: bash
        run: |
          cmake --build build-debug --config Debug --parallel

      - name: Collect debug artifacts
        id: collect_debug
        shell: bash
        run: |
          mkdir -p artifacts-debug
          display_commander_file=$(find build-debug -type f -name "zzz_display_commander.${{ matrix.artifact_suffix }}" | head -1)
          if [ -z "$display_commander_file" ]; then
            echo "Display Commander debug addon file not found; listing build-debug dir:" >&2
            find build-debug -type f -name "*.${{ matrix.artifact_suffix }}" || true
            ls -la build-debug || true
            exit 1
          fi
          cp "$display_commander_file" "artifacts-debug/${{ matrix.artifact_name }}"
          pdb_file=$(find build-debug -type f -name "zzz_display_commander.pdb" | head -1)
          if [ -n "$pdb_file" ]; then
            cp "$pdb_file" "artifacts-debug/zzz_display_commander_${{ matrix.pdb_suffix }}.pdb"
          fi
          # Standalone Launcher .exe (64-bit only)
          if [ "${{ matrix.arch }}" = "x64" ]; then
            exe_file=$(find build-debug -type f -name "Display Commander Launcher.exe" | head -1)
            if [ -n "$exe_file" ]; then
              cp "$exe_file" "artifacts-debug/Display Commander Launcher_x64.exe"
            fi
          fi
          echo "artifact_dir=artifacts-debug" >> $GITHUB_OUTPUT

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: zzz-display-commander-debug-${{ matrix.artifact_suffix }}
          path: ${{ steps.collect_debug.outputs.artifact_dir }}/*
          if-no-files-found: error

  release:
    name: Release
    needs: [ build ]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set Latest Build release body
        id: body_build
        shell: bash
        run: |
          MAJOR=$(grep 'set(DISPLAY_COMMANDER_VERSION_MAJOR' src/addons/display_commander/CMakeLists.txt | sed 's/.* \([0-9]*\))$/\1/')
          MINOR=$(grep 'set(DISPLAY_COMMANDER_VERSION_MINOR' src/addons/display_commander/CMakeLists.txt | sed 's/.* \([0-9]*\))$/\1/')
          PATCH=$(grep 'set(DISPLAY_COMMANDER_VERSION_PATCH' src/addons/display_commander/CMakeLists.txt | sed 's/.* \([0-9]*\))$/\1/')
          VER="${MAJOR}.${MINOR}.${PATCH}.${{ github.run_number }}"
          cat << EOF > release_body_build.txt
          ## Latest Build (bleeding edge)

          Bleeding-edge build from the main branch. Updated on every successful push to main.

          **Version in binaries**: ${VER}

          **Commit**: ${{ github.sha }}

          **Files**:
          - \`zzz_display_commander.addon64\` - 64-bit version
          - \`zzz_display_commander.addon32\` - 32-bit version

          For scheduled development builds, see [Nightly](https://github.com/pmnoxx/display-commander/releases/tag/nightly). For stable releases, use the main [Releases](https://github.com/pmnoxx/display-commander/releases) page.
          EOF
          sed -i 's/^          //' release_body_build.txt

      - name: Download build artifacts (x64)
        uses: actions/download-artifact@v4
        with:
          name: zzz-display-commander-addon64
          path: artifacts

      - name: Download build artifacts (x86)
        uses: actions/download-artifact@v4
        with:
          name: zzz-display-commander-addon32
          path: artifacts


      - name: Create Tag Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/Update Latest Release (main)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest
          allowUpdates: true
          artifacts: artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/Update Latest Build Release (main)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: ncipollo/release-action@v1
        with:
          tag: latest_build
          name: Latest Build
          allowUpdates: true
          artifacts: artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
          bodyFile: release_body_build.txt

  release-debug:
    name: Release Debug
    needs: [ build-debug ]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set Latest Debug release body
        id: body_debug
        shell: bash
        run: |
          MAJOR=$(grep 'set(DISPLAY_COMMANDER_VERSION_MAJOR' src/addons/display_commander/CMakeLists.txt | sed 's/.* \([0-9]*\))$/\1/')
          MINOR=$(grep 'set(DISPLAY_COMMANDER_VERSION_MINOR' src/addons/display_commander/CMakeLists.txt | sed 's/.* \([0-9]*\))$/\1/')
          PATCH=$(grep 'set(DISPLAY_COMMANDER_VERSION_PATCH' src/addons/display_commander/CMakeLists.txt | sed 's/.* \([0-9]*\))$/\1/')
          VER="${MAJOR}.${MINOR}.${PATCH}.${{ github.run_number }}"
          cat << EOF > release_body_debug.txt
          ## Latest Debug Build (with symbols)

          Debug build from the main branch with PDB symbols. Updated on every successful push to main. Use for debugging or crash analysis.

          **Version in binaries**: ${VER}

          **Commit**: ${{ github.sha }}

          **Files**:
          - \`zzz_display_commander.addon64\` - 64-bit addon
          - \`zzz_display_commander.addon32\` - 32-bit addon
          - \`zzz_display_commander_x64.pdb\` - 64-bit symbols
          - \`zzz_display_commander_x86.pdb\` - 32-bit symbols
          - \`Display Commander Launcher_x64.exe\` - 64-bit standalone Launcher (Games + Settings, no ReShade)

          Place the PDB next to the addon (or in the same folder as the game) for symbol resolution in a debugger.
          EOF
          sed -i 's/^          //' release_body_debug.txt

      - name: Download debug artifacts (x64)
        uses: actions/download-artifact@v4
        with:
          name: zzz-display-commander-debug-addon64
          path: artifacts-debug

      - name: Download debug artifacts (x86)
        uses: actions/download-artifact@v4
        with:
          name: zzz-display-commander-debug-addon32
          path: artifacts-debug

      - name: Create/Update Latest Debug Release (main)
        uses: ncipollo/release-action@v1
        with:
          tag: latest_debug
          name: Latest Debug Build
          allowUpdates: true
          artifacts: artifacts-debug/*
          token: ${{ secrets.GITHUB_TOKEN }}
          bodyFile: release_body_debug.txt
